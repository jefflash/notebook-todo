<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebook — To Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: #E2DDD5;
  --border-strong: #C8C2B8;
  --text: #2A2520;
  --text-secondary: #7A746C;
  --text-faint: #B0AAA2;
  --done-text: #B0AAA2;
  --danger: #C0392B;
  --star-empty: #D8D3CB;
  --star-filled: #E8A838;
  --sidebar-w: 208px;
}

body { font-family: 'Lora', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Layout ── */
.app-shell { display: flex; max-width: 1000px; margin: 0 auto; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 1.75rem 0 2rem;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}

.main { flex: 1; padding: 1.75rem 2rem 3rem; min-width: 0; }

/* ── Sidebar ── */
.sidebar-title {
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-faint); font-family: 'DM Mono', monospace;
  padding: 0 16px; margin-bottom: 1.5rem;
}
.nav-section-label {
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  font-family: 'DM Mono', monospace; color: var(--text-faint);
  padding: 0.9rem 16px 0.3rem;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 6px 16px; font-size: 12.5px; font-family: 'DM Mono', monospace;
  cursor: pointer; color: var(--text-secondary); background: transparent;
  border: none; text-align: left; transition: background 0.1s, color 0.1s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-item:hover { background: var(--border); color: var(--text); }
.nav-item.active { background: var(--text); color: var(--bg); }
.nav-item i { font-size: 14px; flex-shrink: 0; }

.nav-cat-row { display: flex; align-items: center; }
.nav-cat-row .nav-item { flex: 1; }
.nav-add-btn {
  background: none; border: none; cursor: pointer; color: var(--text-faint);
  font-size: 14px; line-height: 1; padding: 0 10px 0 4px;
  transition: color 0.1s; flex-shrink: 0;
}
.nav-add-btn:hover { color: var(--text); }

.nav-book { padding-left: 36px; font-size: 12px; display: flex; align-items: center; }
.nav-book-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-right: 8px; }
.nav-book-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.nav-book-del {
  background: none; border: none; cursor: pointer; color: transparent;
  font-size: 12px; padding: 0 2px; line-height: 1; flex-shrink: 0; margin-left: 4px;
}
.nav-item:hover .nav-book-del { color: var(--text-faint); }
.nav-book-del:hover { color: var(--danger) !important; }

.nav-add-book-form {
  display: flex; align-items: center; gap: 4px; padding: 4px 10px 4px 36px;
}
.nav-add-book-input {
  flex: 1; border: none; border-bottom: 1px solid var(--border-strong);
  outline: none; font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--text); background: transparent; padding: 2px 0;
}

/* ── Main header ── */
.main-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.main-title { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); flex: 1; }
.date-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-faint); }
.sort-row { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.sort-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text-faint); }
.sort-select {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-secondary);
  border: 1px solid var(--border-strong); border-radius: 999px;
  padding: 4px 10px; background: transparent; cursor: pointer; outline: none;
}

/* ── Add form ── */
.add-form {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 1.5rem;
}
.add-form-row1 { display: flex; gap: 8px; align-items: center; }
.add-task-input {
  flex: 1; border: none; outline: none; font-family: 'Lora', serif;
  font-size: 14px; color: var(--text); background: transparent;
}
.add-task-input::placeholder { color: var(--text-faint); font-style: italic; }

.add-form-extras { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.add-notes-input {
  width: 100%; border: none; outline: none; font-family: 'Lora', serif;
  font-size: 13px; color: var(--text-secondary); background: transparent;
  resize: none; min-height: 34px; line-height: 1.5; margin-bottom: 8px;
}
.add-notes-input::placeholder { color: var(--text-faint); font-style: italic; }
.add-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.meta-date-input {
  font-family: 'DM Mono', monospace; font-size: 11px;
  border: 1px solid var(--border-strong); border-radius: 6px;
  padding: 4px 8px; color: var(--text-secondary); background: var(--surface);
  outline: none; cursor: pointer;
}
.book-select {
  font-family: 'DM Mono', monospace; font-size: 11px;
  border: 1px solid var(--border-strong); border-radius: 6px;
  padding: 4px 8px; color: var(--text-secondary); background: var(--surface);
  outline: none; cursor: pointer;
}

/* ── Stars ── */
.stars { display: inline-flex; gap: 1px; align-items: center; }
.star-btn {
  background: none; border: none; cursor: pointer; font-size: 15px;
  color: var(--star-empty); padding: 0 1px; line-height: 1;
  transition: color 0.1s, transform 0.1s;
}
.star-btn.filled { color: var(--star-filled); }
.star-btn:hover { transform: scale(1.25); color: var(--star-filled); }
.item-meta .star-btn { font-size: 13px; }

/* ── Mic button ── */
.mic-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-strong);
  background: transparent; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text-secondary); font-size: 14px;
  transition: all 0.15s; flex-shrink: 0;
}
.mic-btn:hover { border-color: var(--text); color: var(--text); }
.mic-btn.recording { background: #FEE2E2; border-color: var(--danger); color: var(--danger); animation: mic-pulse 1s ease-in-out infinite; }
@keyframes mic-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); } 50% { box-shadow: 0 0 0 6px rgba(192,57,43,0); } }

.voice-status { font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 6px; }
.voice-status.error { color: var(--danger); }
.voice-status.processing { color: var(--text-faint); font-style: italic; }

/* ── Add button ── */
.add-btn {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border-strong);
  background: var(--surface); cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text-secondary); font-size: 18px;
  transition: all 0.15s; flex-shrink: 0;
}
.add-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

/* ── Items ── */
.item {
  display: flex; align-items: flex-start; gap: 10px; padding: 9px 10px;
  border-radius: 8px; margin-bottom: 4px; border: 1px solid transparent;
  transition: background 0.1s, border-color 0.1s; position: relative;
}
.item:hover { background: var(--surface); border-color: var(--border); }
.item.done .item-text { text-decoration: line-through; color: var(--done-text); }
.item.done .item-notes { color: var(--text-faint); }

.check-btn {
  width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-strong);
  background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 3px;
  transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  color: transparent; font-size: 12px;
}
.item.done .check-btn { background: var(--text-faint); border-color: var(--text-faint); color: white; }
.check-btn:hover { border-color: var(--text); }

.item-body { flex: 1; min-width: 0; }
.item-text { font-size: 14.5px; line-height: 1.5; color: var(--text); display: block; }
.item-notes { font-size: 12.5px; line-height: 1.5; color: var(--text-secondary); display: block; margin-top: 2px; font-style: italic; }

.item-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.item-book-tag { font-size: 11.5px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; font-weight: 500; }
.item-date { font-size: 10.5px; font-family: 'DM Mono', monospace; color: var(--text-faint); display: flex; align-items: center; gap: 3px; }
.item-date.overdue { color: var(--danger); font-weight: 500; }
.item-date i { font-size: 11px; }

.item-edit-input {
  width: 100%; border: none; border-bottom: 1.5px solid var(--border-strong); outline: none;
  font-family: 'Lora', serif; font-size: 14.5px; line-height: 1.5;
  color: var(--text); background: transparent; padding: 0 2px;
}
.item-edit-input:focus { border-bottom-color: var(--text); }
.item-edit-notes {
  width: 100%; border: none; border-bottom: 1px solid var(--border); outline: none;
  font-family: 'Lora', serif; font-size: 13px; line-height: 1.5;
  color: var(--text-secondary); background: transparent; resize: none;
  min-height: 32px; margin-top: 6px; padding: 0 2px; font-style: italic;
}
.item-edit-notes:focus { border-bottom-color: var(--border-strong); }
.item-edit-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

.item-actions {
  display: flex; gap: 2px; opacity: 0; transition: opacity 0.1s;
  flex-shrink: 0; position: relative; margin-top: 1px;
}
.item:hover .item-actions, .item-actions.show { opacity: 1; }

.icon-btn {
  width: 26px; height: 26px; border-radius: 6px; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-faint); font-size: 14px; transition: all 0.12s;
}
.icon-btn:hover { background: var(--border); color: var(--text); }
.icon-btn.hl-on { color: var(--text-secondary); background: var(--border); }
.icon-btn.del:hover { color: var(--danger); background: #FDECEA; }

/* ── Highlight picker ── */
.hl-picker {
  position: absolute; right: 0; top: calc(100% + 4px);
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 6px 8px; display: flex; align-items: center; gap: 5px;
  z-index: 20; box-shadow: 0 4px 16px rgba(0,0,0,0.10);
}
.hl-swatch {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform 0.12s; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 9px;
}
.hl-swatch:hover { transform: scale(1.3); }
.hl-swatch.sel { box-shadow: 0 0 0 2px var(--text); }

/* ── Misc ── */
.section-label {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  font-family: 'DM Mono', monospace; color: var(--text-faint);
  margin-bottom: 0.5rem; margin-top: 0.25rem;
}
.divider { height: 1px; background: var(--border); margin: 1rem 0 0.75rem; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--text-faint); font-size: 14px; font-style: italic; }
.empty i { font-size: 28px; display: block; margin-bottom: 10px; opacity: 0.5; }

/* ── Where should I start ── */
.suggest-btn {
  display: flex; align-items: center; gap: 8px;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.03em;
  border: 1px solid var(--border-strong); border-radius: 999px;
  padding: 8px 18px; background: var(--surface);
  color: var(--text-secondary); cursor: pointer;
  transition: all 0.15s; margin-bottom: 1.25rem;
}
.suggest-btn:hover:not(:disabled) { background: var(--text); color: var(--bg); border-color: var(--text); }
.suggest-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.suggest-btn i { font-size: 14px; }

.suggestion-panel {
  background: #FFFBF0; border: 1px solid #E8C84A;
  border-radius: 10px; padding: 16px 42px 16px 18px;
  margin-bottom: 1.25rem; position: relative;
}
.suggestion-eyebrow {
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  font-family: 'DM Mono', monospace; color: #A0832A;
  margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
}
.suggestion-task {
  font-size: 15px; font-family: 'Lora', serif;
  color: var(--text); font-weight: 500; margin-bottom: 8px;
}
.suggestion-reason {
  font-size: 13px; font-family: 'Lora', serif;
  color: var(--text-secondary); line-height: 1.65; font-style: italic;
}
.suggestion-dismiss {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; cursor: pointer;
  color: #C8A83A; font-size: 14px; transition: color 0.1s; line-height: 1;
}
.suggestion-dismiss:hover { color: var(--text); }

/* ── Day group headers ── */
.day-group-header {
  display: flex; align-items: center; gap: 10px;
  margin: 1.5rem 0 0.4rem;
}
.day-group-header.first { margin-top: 0; }
.day-group-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.day-group-label {
  font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
  font-family: 'DM Mono', monospace; color: var(--text-secondary); white-space: nowrap; font-weight: 500;
}
.day-group-label.overdue { color: var(--danger); }

/* ── Completing animation ── */
@keyframes strikethrough { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@keyframes check-pop {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.45); }
  72%  { transform: scale(0.88); }
  100% { transform: scale(1); }
}
.item.completing .item-text { position: relative; }
.item.completing .item-text::after {
  content: ''; position: absolute; left: 0; top: 50%;
  width: 100%; height: 4.5px; background: #000;
  transform: scaleX(0); transform-origin: left center;
  animation: strikethrough 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.item.completing .check-btn {
  background: #D1FAE5; border-color: #34D399; color: #059669;
  animation: check-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>
<script>
const STORAGE_KEY = 'notebook_todo_v3';
const CAT_COLORS = { personal: '#8B5E3C', work: '#3B6D8B' };
const HIGHLIGHTS = [
  { id: 'yellow', bg: '#FFF3CD', border: '#E8C84A' },
  { id: 'rose',   bg: '#FFE4E6', border: '#FB7185' },
  { id: 'blue',   bg: '#DBEAFE', border: '#60A5FA' },
  { id: 'green',  bg: '#D1FAE5', border: '#34D399' },
  { id: 'purple', bg: '#EDE9FE', border: '#A78BFA' },
];

let state = {
  activeNav: 'all',
  sortBy: 'none',
  books: [
    { id: 1, name: 'Personal', category: 'personal' },
    { id: 2, name: 'Work', category: 'work' },
  ],
  items: [],
  nextId: 1,
  nextBookId: 3,
};

let ui = {
  hlPicker: null,
  completing: null,
  editingId: null, editText: '', editNotes: '', editDue: '', editPriority: 0,
  addingBookCat: null, newBookName: '',
  formTask: '', formNotes: '', formDue: '', formPriority: 0, formBookId: null,
  voiceActive: false, voiceProcessing: false, voiceMsg: '', voiceIsError: false,
  suggestion: null, suggestionLoading: false, suggestionError: '',
};

// ── Persistence & migration ──
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
    } else {
      const old = localStorage.getItem('notebook_todo_v2');
      if (old) {
        const o = JSON.parse(old);
        state = {
          activeNav: 'all', sortBy: 'none',
          books: o.books || state.books,
          items: (o.items || []).map(it => ({ ...it, notes: '', dueDate: null, priority: 0 })),
          nextId: o.nextId || 1,
          nextBookId: o.nextBookId || 3,
        };
      }
    }
  } catch(e) {}
  if (!ui.formBookId) ui.formBookId = state.books[0]?.id || null;
  render();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── Utilities ──
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return localDateStr(new Date()); }
function tomorrowStr() { const d = new Date(); d.setDate(d.getDate() + 1); return localDateStr(d); }
function todayLabel() { return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }); }

function formatDate(d) {
  if (!d) return '';
  if (d === todayStr()) return 'Today';
  if (d === tomorrowStr()) return 'Tomorrow';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateSection(d) {
  if (d === todayStr()) return 'Today';
  if (d === tomorrowStr()) return 'Tomorrow';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function byPriority(arr) {
  return [...arr].sort((a, b) => (b.priority || 0) - (a.priority || 0));
}

function renderGroupedItems(items, nav) {
  const t = todayStr();
  const overdue  = items.filter(i => i.dueDate && i.dueDate < t);
  const withDate = items.filter(i => i.dueDate && i.dueDate >= t);
  const noDate   = items.filter(i => !i.dueDate);

  const byDate = {};
  withDate.forEach(i => { if (!byDate[i.dueDate]) byDate[i.dueDate] = []; byDate[i.dueDate].push(i); });
  const sortedDates = Object.keys(byDate).sort();

  let h = '';
  let isFirst = true;

  if (overdue.length > 0) {
    h += `<div class="day-group-header${isFirst ? ' first' : ''}"><span class="day-group-label overdue">Overdue</span></div>`;
    isFirst = false;
    byPriority(overdue).forEach(i => { h += itemHTML(i, true); });
  }

  sortedDates.forEach(date => {
    h += `<div class="day-group-header${isFirst ? ' first' : ''}"><span class="day-group-label">${escHtml(formatDateSection(date))}</span></div>`;
    isFirst = false;
    byPriority(byDate[date]).forEach(i => { h += itemHTML(i, true); });
  });

  if (nav !== 'upcoming' && noDate.length > 0) {
    h += `<div class="day-group-header${isFirst ? ' first' : ''}"><span class="day-group-label">No Due Date</span></div>`;
    byPriority(noDate).forEach(i => { h += itemHTML(i, true); });
  }

  return h;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getBook(id) { return state.books.find(b => b.id === id); }

// ── Navigation ──
function setNav(navId) {
  state.activeNav = navId;
  ui.editingId = null; ui.hlPicker = null;
  if (navId.startsWith('book:')) {
    ui.formBookId = parseInt(navId.slice(5));
  } else if (navId.startsWith('cat:')) {
    const cat = navId.slice(4);
    const first = state.books.find(b => b.category === cat);
    if (first) ui.formBookId = first.id;
  }
  save(); render();
}

function getNavTitle() {
  const n = state.activeNav;
  if (n === 'all') return 'All Tasks';
  if (n === 'starred') return 'High Priority';
  if (n === 'today') return 'Today';
  if (n === 'upcoming') return 'Upcoming';
  if (n === 'completed') return 'Completed';
  if (n.startsWith('cat:')) { const c = n.slice(4); return c[0].toUpperCase() + c.slice(1); }
  if (n.startsWith('book:')) { const b = getBook(parseInt(n.slice(5))); return b ? b.name : ''; }
  return '';
}

// ── Filtering & sorting ──
function getFilteredItems() {
  const n = state.activeNav;
  const t = todayStr();
  let items = state.items;

  if (n === 'all')            items = items.filter(i => !i.done);
  else if (n === 'starred')   items = items.filter(i => !i.done && (i.priority || 0) >= 3);
  else if (n === 'today')     items = items.filter(i => !i.done && i.dueDate && i.dueDate <= t);
  else if (n === 'upcoming')  items = items.filter(i => !i.done && i.dueDate && i.dueDate > t);
  else if (n === 'completed') items = items.filter(i => i.done);
  else if (n.startsWith('cat:')) {
    const ids = state.books.filter(b => b.category === n.slice(4)).map(b => b.id);
    items = items.filter(i => !i.done && ids.includes(i.bookId));
  } else if (n.startsWith('book:')) {
    const bookId = parseInt(n.slice(5));
    items = items.filter(i => i.bookId === bookId && !i.done);
  }

  if (n === 'today') {
    return [...items].sort((a, b) => {
      if (a.dueDate !== b.dueDate) return a.dueDate.localeCompare(b.dueDate);
      return (b.priority || 0) - (a.priority || 0);
    });
  }
  return items;
}

// ── Books ──
function startAddBook(cat) {
  ui.addingBookCat = cat; ui.newBookName = '';
  render();
  setTimeout(() => { const el = document.getElementById('new-book-input'); if (el) el.focus(); }, 0);
}

function confirmAddBook() {
  const name = ui.newBookName.trim();
  const cat = ui.addingBookCat || 'personal';
  ui.addingBookCat = null;
  if (!name) { render(); return; }
  const book = { id: state.nextBookId++, name, category: cat };
  state.books.push(book);
  state.activeNav = `book:${book.id}`;
  ui.formBookId = book.id;
  save(); render();
}

function handleBookKey(e) {
  if (e.key === 'Enter') confirmAddBook();
  if (e.key === 'Escape') { ui.addingBookCat = null; render(); }
}

function deleteBook(id) {
  if (state.books.length <= 1) { alert('You need at least one book.'); return; }
  const book = getBook(id);
  if (!book) return;
  const n = state.items.filter(i => i.bookId === id).length;
  if (!confirm(n > 0 ? `Delete "${book.name}" and its ${n} item${n===1?'':'s'}?` : `Delete "${book.name}"?`)) return;
  state.books = state.books.filter(b => b.id !== id);
  state.items = state.items.filter(i => i.bookId !== id);
  if (state.activeNav === `book:${id}`) state.activeNav = 'all';
  if (ui.formBookId === id) ui.formBookId = state.books[0]?.id || null;
  save(); render();
}

// ── Items CRUD ──
function submitAdd() {
  const text = ui.formTask.trim();
  if (!text) return;
  const bookId = ui.formBookId || state.books[0]?.id;
  if (!bookId) return;
  state.items.push({
    id: state.nextId++, bookId, text,
    notes: ui.formNotes.trim(), done: false, hl: null,
    dueDate: ui.formDue || null, priority: ui.formPriority,
  });
  ui.formTask = ''; ui.formNotes = ''; ui.formDue = ''; ui.formPriority = 0;
  save(); render();
  setTimeout(() => { const el = document.getElementById('new-task'); if (el) el.focus(); }, 0);
}

function handleCheckClick(id) {
  if (ui.completing === id) return;
  const it = state.items.find(i => i.id === id);
  if (!it) return;
  if (it.done) { it.done = false; save(); render(); return; }
  ui.completing = id; render();
  setTimeout(() => {
    const item = state.items.find(i => i.id === id);
    if (item && !item.done) { item.done = true; save(); }
    ui.completing = null; render();
  }, 600);
}

function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  state.items = state.items.filter(i => i.id !== id);
  save(); render();
}

// ── Edit ──
function startEdit(id) {
  const it = state.items.find(i => i.id === id);
  if (!it) return;
  ui.editingId = id; ui.editText = it.text; ui.editNotes = it.notes || '';
  ui.editDue = it.dueDate || ''; ui.editPriority = it.priority || 0;
  ui.hlPicker = null; render();
  setTimeout(() => { const el = document.getElementById(`edit-${id}`); if (el) { el.focus(); el.select(); } }, 0);
}

function saveEdit(id) {
  if (ui.editingId !== id) return;
  const text = ui.editText.trim();
  if (text) {
    const it = state.items.find(i => i.id === id);
    if (it) { it.text = text; it.notes = ui.editNotes.trim(); it.dueDate = ui.editDue || null; it.priority = ui.editPriority; save(); }
  }
  ui.editingId = null; render();
}

function cancelEdit() { ui.editingId = null; render(); }
function handleEditKey(e, id) {
  if (e.key === 'Enter') { e.preventDefault(); saveEdit(id); }
  if (e.key === 'Escape') cancelEdit();
}

// ── Priority ──
function setItemPriority(id, n) {
  const it = state.items.find(i => i.id === id);
  if (it) { it.priority = it.priority === n ? 0 : n; save(); render(); }
}
function setFormPriority(n) { ui.formPriority = ui.formPriority === n ? 0 : n; render(); }
function setEditPriority(n) { ui.editPriority = ui.editPriority === n ? 0 : n; render(); }

function itemStarsHTML(it) {
  let h = '<span class="stars">';
  for (let i = 1; i <= 3; i++) {
    h += `<button class="star-btn${i <= (it.priority||0) ? ' filled' : ''}" onclick="event.stopPropagation();setItemPriority(${it.id},${i})" title="${i} star${i>1?'s':''}">★</button>`;
  }
  return h + '</span>';
}

function starsHTML(priority, fn) {
  let h = '<span class="stars">';
  for (let i = 1; i <= 3; i++) {
    h += `<button class="star-btn${i <= (priority||0) ? ' filled' : ''}" onclick="event.stopPropagation();${fn}(${i})" title="${i} star${i>1?'s':''}">★</button>`;
  }
  return h + '</span>';
}

// ── Highlights ──
function togglePicker(id) { ui.hlPicker = ui.hlPicker === id ? null : id; render(); }
function setHl(id, color) {
  const it = state.items.find(i => i.id === id);
  if (it) { it.hl = color; save(); }
  ui.hlPicker = null; render();
}
function pickerHTML(it) {
  return `<div class="hl-picker" onclick="event.stopPropagation()">
    <button class="hl-swatch${!it.hl?' sel':''}" style="background:var(--border);color:var(--text-secondary)" onclick="setHl(${it.id},null)" title="None">×</button>
    ${HIGHLIGHTS.map(h=>`<button class="hl-swatch${it.hl===h.id?' sel':''}" style="background:${h.bg};border-color:${h.border}66" onclick="setHl(${it.id},'${h.id}')" title="${h.id}"></button>`).join('')}
  </div>`;
}

// ── Voice ──
let recognition = null;

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { ui.voiceMsg = 'Voice input requires Chrome or Edge.'; ui.voiceIsError = true; render(); return; }
  if (ui.voiceActive) { if (recognition) recognition.stop(); return; }

  recognition = new SR();
  recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'en-US';
  ui.voiceActive = true; ui.voiceMsg = ''; ui.voiceIsError = false;
  render();
  recognition.start();

  recognition.onresult = async (e) => {
    const transcript = e.results[0][0].transcript;
    ui.voiceActive = false; ui.voiceProcessing = true; ui.voiceMsg = 'Parsing…'; ui.voiceIsError = false;
    render();
    await parseVoice(transcript);
  };
  recognition.onerror = (e) => {
    ui.voiceActive = false; ui.voiceProcessing = false;
    ui.voiceMsg = e.error === 'not-allowed' ? 'Microphone access denied.' : `Error: ${e.error}`;
    ui.voiceIsError = true; render();
  };
  recognition.onend = () => { if (ui.voiceActive) { ui.voiceActive = false; render(); } };
}

async function parseVoice(transcript) {
  try {
    const res = await fetch('/api/parse-voice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript }),
    });
    if (!res.ok) throw new Error('api error');
    const data = await res.json();
    if (data.task)  ui.formTask     = data.task;
    if (data.notes) ui.formNotes    = data.notes;
    if (data.dueDate) ui.formDue    = data.dueDate;
    if (data.priority) ui.formPriority = data.priority;
    ui.voiceProcessing = false; ui.voiceMsg = ''; ui.voiceIsError = false;
    render();
    setTimeout(() => { const el = document.getElementById('new-task'); if (el) el.focus(); }, 0);
  } catch(e) {
    ui.voiceProcessing = false;
    ui.voiceMsg = 'Could not parse voice input. Try again.'; ui.voiceIsError = true;
    render();
  }
}

// ── Where should I start ──
async function fetchSuggestion() {
  const allTasks = state.items.filter(i => !i.done);
  if (!allTasks.length) return;

  ui.suggestionLoading = true; ui.suggestion = null; ui.suggestionError = '';
  render();

  const t = todayStr();
  const tom = tomorrowStr();
  const tasks = allTasks.map(i => {
    let dueLabel = null;
    if (i.dueDate) {
      if (i.dueDate < t)      dueLabel = `OVERDUE since ${i.dueDate}`;
      else if (i.dueDate === t)   dueLabel = 'due today';
      else if (i.dueDate === tom) dueLabel = 'due tomorrow';
      else                        dueLabel = `due ${i.dueDate}`;
    }
    return { text: i.text, notes: i.notes || '', priority: i.priority || 0, dueLabel };
  });

  try {
    const res = await fetch('/api/suggest-task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tasks, today: t }),
    });
    if (!res.ok) throw new Error('api error');
    const data = await res.json();
    ui.suggestion = { task: data.task, reason: data.reason };
    ui.suggestionLoading = false;
    render();
  } catch(e) {
    ui.suggestionLoading = false;
    ui.suggestionError = 'Could not get a suggestion. Try again.';
    render();
  }
}

// ── Render: Sidebar ──
function renderSidebar() {
  const nav = state.activeNav;
  const views = [
    { id: 'all',       icon: 'ti-list',          label: 'All Tasks' },
    { id: 'starred',   icon: 'ti-stars',          label: 'High Priority' },
    { id: 'today',     icon: 'ti-calendar-event', label: 'Today' },
    { id: 'upcoming',  icon: 'ti-calendar-due',   label: 'Upcoming' },
    { id: 'completed', icon: 'ti-circle-check',   label: 'Completed' },
  ];

  let h = `<div class="sidebar-title">Notebook</div>`;
  h += `<div class="nav-section-label"><span>Views</span></div>`;
  views.forEach(v => {
    h += `<button class="nav-item${nav === v.id ? ' active' : ''}" onclick="setNav('${v.id}')"><i class="ti ${v.icon}"></i>${v.label}</button>`;
  });

  h += `<div class="nav-section-label" style="margin-top:0.5rem"><span>Filters</span></div>`;
  ['personal', 'work'].forEach(cat => {
    const catId = `cat:${cat}`;
    const label = cat[0].toUpperCase() + cat.slice(1);
    h += `<div class="nav-cat-row">
      <button class="nav-item${nav === catId ? ' active' : ''}" onclick="setNav('${catId}')" style="${nav !== catId ? `color:${CAT_COLORS[cat]};font-weight:600` : ''}">
        <i class="ti ti-folder"></i>${label}
      </button>
      <button class="nav-add-btn" onclick="startAddBook('${cat}')" title="New ${label} book"><i class="ti ti-plus"></i></button>
    </div>`;

    state.books.filter(b => b.category === cat).forEach(b => {
      const bookId = `book:${b.id}`;
      h += `<button class="nav-item nav-book${nav === bookId ? ' active' : ''}" onclick="setNav('${bookId}')">
        <span class="nav-book-dot" style="background:${CAT_COLORS[cat]}"></span>
        <span class="nav-book-name">${escHtml(b.name)}</span>
        <span class="nav-book-del" onclick="event.stopPropagation();deleteBook(${b.id})" title="Delete"><i class="ti ti-x"></i></span>
      </button>`;
    });

    if (ui.addingBookCat === cat) {
      h += `<div class="nav-add-book-form">
        <input id="new-book-input" class="nav-add-book-input" type="text" placeholder="Book name…"
          oninput="ui.newBookName=this.value" onkeydown="handleBookKey(event)">
        <button class="icon-btn" onmousedown="event.preventDefault();confirmAddBook()" title="Add"><i class="ti ti-check"></i></button>
      </div>`;
    }
  });
  return h;
}

// ── Render: Add form ──
function renderAddForm() {
  const bookOpts = state.books.map(b =>
    `<option value="${b.id}"${b.id === (ui.formBookId || state.books[0]?.id) ? ' selected' : ''}>${escHtml(b.name)}</option>`
  ).join('');

  return `<div class="add-form">
    <div class="add-form-row1">
      <input id="new-task" class="add-task-input" type="text" placeholder="Add a task…"
        value="${escHtml(ui.formTask)}"
        oninput="ui.formTask=this.value"
        onkeydown="if(event.key==='Enter')submitAdd()">
      <button class="mic-btn${ui.voiceActive ? ' recording' : ''}" onclick="startVoice()" title="${ui.voiceActive ? 'Stop' : 'Voice input'}">
        <i class="ti ${ui.voiceActive ? 'ti-microphone-off' : 'ti-microphone'}"></i>
      </button>
      <button class="add-btn" onclick="submitAdd()" aria-label="Add"><i class="ti ti-plus"></i></button>
    </div>
    <div class="add-form-extras">
      <textarea id="new-notes" class="add-notes-input" placeholder="Notes (optional)…"
        oninput="ui.formNotes=this.value">${escHtml(ui.formNotes)}</textarea>
      <div class="add-meta-row">
        <select class="book-select" onchange="ui.formBookId=parseInt(this.value)">${bookOpts}</select>
        <input type="date" id="new-due" class="meta-date-input" value="${escHtml(ui.formDue)}"
          onchange="ui.formDue=this.value">
        ${starsHTML(ui.formPriority, 'setFormPriority')}
      </div>
    </div>
    ${ui.voiceMsg ? `<div class="voice-status ${ui.voiceIsError ? 'error' : 'processing'}">${escHtml(ui.voiceMsg)}</div>` : ''}
  </div>`;
}

// ── Render: Item ──
function itemHTML(it, hideDue) {
  const hl = HIGHLIGHTS.find(h => h.id === it.hl);
  const hlStyle = hl ? `background:${hl.bg};border-color:${hl.border};` : '';
  const isCompleting = ui.completing === it.id;
  const isEditing = ui.editingId === it.id;
  const book = getBook(it.bookId);
  const cat = book?.category || 'personal';
  const t = todayStr();
  const isOverdue = it.dueDate && it.dueDate < t && !it.done;

  if (isEditing) {
    return `<div class="item" style="${hlStyle}">
      <div style="width:20px;flex-shrink:0;margin-top:3px"></div>
      <div class="item-body">
        <input id="edit-${it.id}" class="item-edit-input" type="text"
          value="${escHtml(ui.editText)}"
          oninput="ui.editText=this.value"
          onkeydown="handleEditKey(event,${it.id})"
          onclick="event.stopPropagation()">
        <textarea class="item-edit-notes" placeholder="Notes…"
          oninput="ui.editNotes=this.value"
          onkeydown="if(event.key==='Escape')cancelEdit()"
          onclick="event.stopPropagation()">${escHtml(ui.editNotes)}</textarea>
        <div class="item-edit-meta">
          <input type="date" class="meta-date-input" value="${escHtml(ui.editDue)}"
            onchange="ui.editDue=this.value" onclick="event.stopPropagation()">
          ${starsHTML(ui.editPriority, 'setEditPriority')}
        </div>
      </div>
      <div class="item-actions show">
        <button class="icon-btn" onmousedown="event.preventDefault();saveEdit(${it.id})" title="Save"><i class="ti ti-check"></i></button>
        <button class="icon-btn" onmousedown="event.preventDefault();cancelEdit()" title="Cancel"><i class="ti ti-x"></i></button>
      </div>
    </div>`;
  }

  return `<div class="item${it.done?' done':''}${isCompleting?' completing':''}" style="${hlStyle}">
    <button class="check-btn" onclick="handleCheckClick(${it.id})" title="${it.done?'Reopen':'Complete'}">
      ${it.done||isCompleting?'<i class="ti ti-check"></i>':''}
    </button>
    <div class="item-body">
      <span class="item-text">${escHtml(it.text)}</span>
      ${it.notes ? `<span class="item-notes">${escHtml(it.notes)}</span>` : ''}
      <div class="item-meta">
        <span class="item-book-tag" style="color:${CAT_COLORS[cat]}">${escHtml(book?.name || '')}</span>
        ${it.dueDate && !hideDue ? `<span class="item-date${isOverdue?' overdue':''}"><i class="ti ti-calendar-event"></i>${formatDate(it.dueDate)}</span>` : ''}
        ${itemStarsHTML(it)}
      </div>
    </div>
    <div class="item-actions">
      <button class="icon-btn" onclick="startEdit(${it.id})" title="Edit"><i class="ti ti-pencil"></i></button>
      <button class="icon-btn${it.hl?' hl-on':''}" onclick="event.stopPropagation();togglePicker(${it.id})" title="Highlight"><i class="ti ti-highlight"></i></button>
      ${ui.hlPicker===it.id?pickerHTML(it):''}
      <button class="icon-btn del" onclick="deleteItem(${it.id})" title="Delete"><i class="ti ti-trash"></i></button>
    </div>
  </div>`;
}

// ── Render: Main ──
function renderMain() {
  const nav = state.activeNav;
  const title = getNavTitle();
  const items = getFilteredItems();

  let h = `<div class="main-header">
    <span class="main-title">${escHtml(title)}</span>
    ${nav === 'today' ? `<span class="date-label">${todayLabel()}</span>` : ''}
  </div>`;

  if (nav !== 'completed') h += renderAddForm();

  if (nav !== 'completed') {
    const pendingCount = state.items.filter(i => !i.done).length;
    if (ui.suggestionLoading) {
      h += `<button class="suggest-btn" disabled><i class="ti ti-sparkles"></i>Thinking…</button>`;
    } else if (ui.suggestion) {
      h += `<div class="suggestion-panel">
        <button class="suggestion-dismiss" onclick="ui.suggestion=null;render()" title="Dismiss"><i class="ti ti-x"></i></button>
        <div class="suggestion-eyebrow"><i class="ti ti-sparkles"></i>Where should I start?</div>
        <div class="suggestion-task">${escHtml(ui.suggestion.task)}</div>
        <div class="suggestion-reason">${escHtml(ui.suggestion.reason)}</div>
      </div>`;
    } else if (pendingCount > 0) {
      h += `<button class="suggest-btn" onclick="fetchSuggestion()"><i class="ti ti-sparkles"></i>Where should I start?</button>`;
      if (ui.suggestionError) h += `<div class="voice-status error" style="margin-top:-0.75rem;margin-bottom:1rem">${escHtml(ui.suggestionError)}</div>`;
    }
  }

  const emptyMsgs = {
    all: ['ti-notebook', 'Nothing here yet. Add your first task above.'],
    starred: ['ti-stars', 'No high priority tasks.'],
    today: ['ti-calendar-event', 'Nothing due today.'],
    upcoming: ['ti-calendar-due', 'No upcoming tasks.'],
    completed: ['ti-circle-check', 'No completed tasks yet.'],
  };

  if (items.length === 0) {
    const [icon, msg] = emptyMsgs[nav] || ['ti-notebook', 'Nothing here yet.'];
    h += `<div class="empty"><i class="ti ${icon}"></i>${msg}</div>`;
  } else if (nav === 'all' || nav === 'starred' || nav === 'upcoming') {
    h += renderGroupedItems(items, nav);
  } else {
    items.forEach(it => { h += itemHTML(it); });
  }
  return h;
}

// ── Render ──
function render() {
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');
  if (sidebar) sidebar.innerHTML = renderSidebar();
  if (main) main.innerHTML = renderMain();

  // Restore textarea values (innerHTML sets defaultValue, not value)
  const notesEl = document.getElementById('new-notes');
  if (notesEl) notesEl.value = ui.formNotes;

  if (ui.addingBookCat) {
    const el = document.getElementById('new-book-input');
    if (el) { el.focus(); el.value = ui.newBookName; }
  }
  if (ui.editingId !== null) {
    const el = document.getElementById(`edit-${ui.editingId}`);
    if (el) el.focus();
    const ta = document.querySelector('.item-edit-notes');
    if (ta) ta.value = ui.editNotes;
  }
}

document.addEventListener('click', () => {
  if (ui.hlPicker !== null) { ui.hlPicker = null; render(); }
});

load();
</script>
